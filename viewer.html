<!doctype html>

<html>

<head>

  <title>IIIF Viewer</title>
  <meta name="viewport"
    content="initial-scale=1.0, width=device-width, user-scalable=yes, minimum-scale=1.0, maximum-scale=2.0">

  <link rel="stylesheet" type="text/css" href="viewer_style.css">

  <link href="https://fonts.googleapis.com/css?family=Barlow+Condensed:100,200,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;700&display=swap" rel="stylesheet">

  <script src="javascript/openseadragon/openseadragon.min.js"></script>
  <script src="javascript/openseadragon/openseadragon-scalebar.js"></script>
  <script src="javascript/jquery-3.5.1.min.js"></script>

  <style>
  </style>
</head>

<body>
  <div id="imageviewer" style="position:absolute; width:100%!important; height:100%!important;">
    <div class="interface-area-top">
      <div class="toolbar-top">

        <a id="prev-button" href="#previous-page">
          <div id="Prev" class="NavButton"></div>
        </a>
        <span id='currentpage'>1 / 1</span>
        <a id="next-button" href="#next-page">
          <div id="Next" class="NavButton"></div>
        </a>

      </div>
    </div>

    <div id="ToolbarVertical">
      <a id="rotate-left" href="#rotate-left">
        <div id="RotateLeft" class="NavButton"></div>
      </a>
      <a id="rotate-right" href="#rotate-right">
        <div id="RotateRight" class="NavButton"></div>
      </a>

    </div>
    <!-- <a id="download" ref="downloadButton" target="_self" href="">
      <div id="" class="download-button NavButton" title="Download image"></div>
    </a> -->
  </div>


  <!--  These are the regular controls -->
  <div class="interface-area-bottom">
    <div class="toolbar-bottom" style="">

      <a id="home" href="#home">
        <div id="Home" class="NavButton"></div>
      </a>
      <a id="zoom-in" href="#zoom-in">
        <div id="ZoomIn" class="NavButton"></div>
      </a>
      <a id="zoom-out" href="#zoom-out">
        <div id="ZoomOut" class="NavButton"></div>
      </a>
    </div>
  </div>
  </div>

  <script type="text/javascript">
    var viewer = OpenSeadragon({
      id: "imageviewer",
      immediateRender: false,
      visibilityRatio: 0.8,
      minZoomImageRatio: 0.8,
      maxZoomPixelRatio: 1,
      homeFillsViewer: false,
      showZoomControl: true,
      showHomeControl: true,
      showFullPageControl: true,
      showNavigator: true,
      navigatorPosition: "TOP_RIGHT",
      navigatorAutoFade: true,
      preserveViewport: true,
      fullPageButton: "full-page",
      zoomInButton: "zoom-in",
      zoomOutButton: "zoom-out",
      nextButton: "next-button",
      previousButton: "prev-button",
      showRotationControl: true,
      rotateLeftButton: "rotate-left",
      rotateRightButton: "rotate-right",
      gestureSettingsTouch: {
        pinchRotate: true
      },
      homeButton: "home",
      sequenceMode: true,
      prefixUrl: "javascript/openseadragon/images/",
      tileSources: [
        "https://img.dh.gu.se/saintsophia/static/inscriptions/iiif/32e92b30-b018-4538-b3b6-dac6f67fdedf.tif/info.json",
      ],
    });
    viewer.addHandler("page", function (data) {
      document.getElementById("currentpage").innerHTML = (data.page + 1) + " / 1";
    });
    viewer.scalebar({
      type: OpenSeadragon.ScalebarType.MICROSCOPY,
      minWidth: "50px",
      pixelsPerMeter: 10,
      location: OpenSeadragon.ScalebarLocation.BOTTOM_RIGHT,
      color: "rgb(255, 255, 255)",
      fontColor: "rgb(255, 255, 255)",
      fontSize: "18px",
      xOffset: 20,
      yOffset: 20,
      stayInsideImage: false,
    });
  </script>

</body>

</html>
